name: picard
grade: stable
confinement: strict
base: core24
license: GPL-2.0-or-later
adopt-info: picard
contact: https://community.metabrainz.org/c/picard
donation: https://metabrainz.org/donate
issues: https://tickets.metabrainz.org/projects/PICARD/issues/
source-code: https://github.com/metabrainz/picard
website: https://picard.musicbrainz.org/

platforms:
  amd64:
  arm64:

apps:
  picard:
    extensions:
      - kde-neon-6
    common-id: org.musicbrainz.Picard
    command: bin/picard
    environment:
      PYTHONPATH: "$SNAP/usr/lib/python3/dist-packages"
    plugs:
      - gsettings
      - home  # At a minimum users should be allowed to tag files on their home directory
      - network-manager-observe  # Used by Qt6, required to avoid warnings on startup
      - optical-drive  # CD lookup support
      - pulseaudio  # For eventual backwards compatibility only
      - removable-media  # Tagging files on external media is a common use case
    command-chain:
      - bin/app-launch

  fpcalc:
    command: usr/bin/fpcalc
    plugs:
      - home
      - removable-media

  rsgain:
    command: usr/bin/rsgain
    plugs:
      - home
      - removable-media

parts:
  picard:
    after:
      - pyqt6
      - selective-checkout
    source: https://github.com/metabrainz/picard.git
    source-branch: master
    # source-tag: release-3.0.0a4
    # source-depth: 1
    plugin: python
    parse-info:
      - share/metainfo/org.musicbrainz.Picard.appdata.xml

    override-build: |
      "$CRAFT_STAGE"/scriptlets/selective-checkout \
        --release-tag-prefix="release-" \
        --stable-tag-pattern="[[:digit:]]+\.[[:digit:]]+(\.[[:digit:]]+)?$" \
        --beta-tag-pattern="[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+b[[:digit:]]+$"
        # --release-candidate-tag-pattern="[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+rc[[:digit:]]+$"
      git apply --verbose "${SNAPCRAFT_PROJECT_DIR}"/patching/picard/*.patch
      craftctl default

    prime:
      # PyQt installed from requirements, exclude as the snap includes its own PyQt build
      - -lib/python3*/site-packages/PyQt6*
      - -lib/python3*/site-packages/pyqt6*
      # Exclude development files
      - -usr/include/*
      - -usr/lib/*-linux-gnu/pkgconfig/*
      # Exclude unused libraries
      - -usr/lib/*-linux-gnu/libcaca++.so*
      - -usr/lib/*-linux-gnu/libcjson_utils.so*
      - -usr/lib/*-linux-gnu/libcolordprivate.so*
      - -usr/lib/*-linux-gnu/libdconf.so*
      - -usr/lib/*-linux-gnu/libEGL_mesa.so*
      - -usr/lib/*-linux-gnu/libexslt.so*
      - -usr/lib/*-linux-gnu/libfaad_drm.so*
      - -usr/lib/*-linux-gnu/libflite*.so*
      - -usr/lib/*-linux-gnu/libform.so*
      - -usr/lib/*-linux-gnu/libfreebl*.so*
      - -usr/lib/*-linux-gnu/libGLX_mesa.so*
      - -usr/lib/*-linux-gnu/libgstcheck-*.so*
      - -usr/lib/*-linux-gnu/libgstcontroller-*.so*
      - -usr/lib/*-linux-gnu/libgstdxva-*.so*
      - -usr/lib/*-linux-gnu/libgstplay-*.so*
      - -usr/lib/*-linux-gnu/libgstplayer-*.so*
      - -usr/lib/*-linux-gnu/libgsttranscoder-*.so*
      - -usr/lib/*-linux-gnu/libhwy_contrib.so*
      - -usr/lib/*-linux-gnu/libhwy_test.so*
      - -usr/lib/*-linux-gnu/libicuio.so*
      - -usr/lib/*-linux-gnu/libicutest.so*
      - -usr/lib/*-linux-gnu/libicutu.so*
      - -usr/lib/*-linux-gnu/libjacknet.so*
      - -usr/lib/*-linux-gnu/libjackserver.so*
      - -usr/lib/*-linux-gnu/libmenu.so*
      - -usr/lib/*-linux-gnu/libmfx-tracer.so*
      - -usr/lib/*-linux-gnu/libmfx-tracer.so*
      - -usr/lib/*-linux-gnu/libmfxhw64.so*
      - -usr/lib/*-linux-gnu/libnssckbi.so
      - -usr/lib/*-linux-gnu/libnssdbm3.so
      - -usr/lib/*-linux-gnu/libOpenEXRCore-*.so*
      - -usr/lib/*-linux-gnu/libOpenEXRUtil-*.so*
      - -usr/lib/*-linux-gnu/liborc-test-*.so*
      - -usr/lib/*-linux-gnu/libpanel.so*
      - -usr/lib/*-linux-gnu/libsmime3.so*
      - -usr/lib/*-linux-gnu/libsoftokn3.so*
      - -usr/lib/*-linux-gnu/libSoundTouchDll.so*
      - -usr/lib/*-linux-gnu/libssl3.so
      - -usr/lib/*-linux-gnu/libunwind-*.so*
      - -usr/lib/*-linux-gnu/libxcb-glx.so*
      - -usr/lib/*-linux-gnu/libXxf86vm.so*
      - -usr/lib/*-linux-gnu/libzvbi-chains.so*
    stage-packages:
      - gstreamer1.0-plugins-bad
      - gstreamer1.0-plugins-good
      - libchromaprint-tools

  pyqt6:
    plugin: nil
    source: https://files.pythonhosted.org/packages/96/03/e756f52e8b0d7bb5527baf8c46d59af0746391943bdb8655acba22ee4168/pyqt6-6.10.2.tar.gz
    source-type: tar
    source-checksum: sha256/6c0db5d8cbb9a3e7e2b5b51d0ff3f283121fa27b864db6d2f35b663c9be5cc83
    build-snaps:
      - kde-qt6-core24-sdk
    build-packages:
      - libvulkan-dev
    override-build: |
      # Set path to qmake
      echo "[tool.sip.builder]" >> pyproject.toml
      echo "qmake = \"/snap/kde-qt6-core24-sdk/current/usr/bin/qt6/qmake\"" >> pyproject.toml

      # Install build dependencies
      pip install --break-system-packages PyQt6-sip PyQt-builder

      # Build PyQt6
      export LD_LIBRARY_PATH="/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:/snap/kde-qt6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:$LD_LIBRARY_PATH"
      export CFLAGS="-I/snap/kde-qt6-core24-sdk/current/usr/include ${CFLAGS:-}"
      export CXXFLAGS="-I/snap/kde-qt6-core24-sdk/current/usr/include ${CXXFLAGS:-}"
      export LDFLAGS="-L/snap/kde-qt6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR ${LDFLAGS:-}"
      sip-install \
        --qt-shared \
        --concatenate=1 \
        --confirm-license \
        --debug \
        --verbose \
        --jobs="$CRAFT_PARALLEL_BUILD_COUNT" \
        --target-dir="$CRAFT_PART_INSTALL/usr/lib/python3/dist-packages" \
        --enable=QtCore \
        --enable=QtDBus \
        --enable=QtGui \
        --enable=QtMultimedia \
        --enable=QtNetwork \
        --enable=QtWidgets \
        --no-dbus-python \
        --no-designer-plugin \
        --no-docstrings \
        --no-qml-plugin \
        --no-tools \
        --qmake-setting QMAKE_CFLAGS="$CFLAGS" \
        --qmake-setting QMAKE_CXXFLAGS="$CXXFLAGS" \
        --qmake-setting QMAKE_LFLAGS="$LDFLAGS"

      # The sip.cpython-*.so file is required for PyQt6 during runtime
      install /usr/local/lib/python3.12/dist-packages/PyQt6/sip.cpython-*.so "$CRAFT_PART_INSTALL/usr/lib/python3/dist-packages/PyQt6"

  # Separate dependencies needed for some Picard plugins
  plugin-requirements:
    plugin: nil
    stage-packages:
      - python3-aubio  # for the BPM plugin
      - python3-zstandard
    prime:
      - -usr/bin/dh_numpy3
      - -usr/bin/f2py*
      - -usr/lib/*-linux-gnu/pkgconfig/*
      - -usr/lib/*-linux-gnu/libcjson_utils.so*
      - -usr/lib/*-linux-gnu/libfftw3f_omp.so*
      - -usr/lib/*-linux-gnu/libfftw3f_threads.so*
      - -usr/lib/*-linux-gnu/libhwy_contrib.so*
      - -usr/lib/*-linux-gnu/libhwy_test.so*
      - -usr/lib/*-linux-gnu/libicuio.so*
      - -usr/lib/*-linux-gnu/libicutest.so*
      - -usr/lib/*-linux-gnu/libicutu.so*
      - -usr/lib/*-linux-gnu/libzvbi-chains.so*

  libdiscid:
    plugin: cmake
    source: https://data.metabrainz.org/pub/musicbrainz/libdiscid/libdiscid-0.6.5.tar.gz
    source-type: tar
    source-checksum: sha256/72dbb493e07336418fe2056f0ebc7ce544eedb500bb896cc1cc04bd078c2d530
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
    prime:
      - -usr/include/*
      - -usr/lib/x86_64-linux-gnu/pkgconfig/*

  rsgain:
    plugin: cmake
    source: https://github.com/complexlogic/rsgain/releases/download/v3.7/rsgain-3.7-source.tar.xz
    source-type: tar
    source-checksum: sha256/54037f73ba6682f9b71b2265275f5f89de50b90b12d5af512287c60d9d52c9cc
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
    build-packages:
      - build-essential
      - libavcodec-dev
      - libavformat-dev
      - libavutil-dev
      - libebur128-dev
      - libfmt-dev
      - libinih-dev
      - libswresample-dev
      - libtag1-dev
      - pkg-config
    stage-packages:
      - libavformat60
      - libbluray2
      - libebur128-1
      - libfmt9
      - libinih1
      - libssh-gcrypt-4
      - libtag1v5
    prime:
      - -usr/lib/*-linux-gnu/libcjson_utils.so*
      - -usr/lib/*-linux-gnu/libhwy_contrib.so*
      - -usr/lib/*-linux-gnu/libhwy_test.so*
      - -usr/lib/*-linux-gnu/libicuio.so*
      - -usr/lib/*-linux-gnu/libicutest.so*
      - -usr/lib/*-linux-gnu/libicutu.so*
      - -usr/lib/*-linux-gnu/libzvbi-chains.so*

  # Custom launch scripts
  command-chain:
    plugin: dump
    source: command-chain
    organize:
      '*': bin/

  # Check out the tagged release revision if it isn't promoted to the stable channel
  # https://forum.snapcraft.io/t/selective-checkout-check-out-the-tagged-release-revision-if-it-isnt-promoted-to-the-stable-channel/10617
  selective-checkout:
    source: https://github.com/Lin-Buo-Ren/selective-checkout.git
    source-tag: v3.0.6
    plugin: dump
    build-packages:
      - curl
      - jq
      - sed
      - git
    stage:
      - scriptlets/selective-checkout
    prime:
      - -*

lint:
  ignore:
    - library:
      - usr/lib/*-linux-gnu/caca/libgl_plugin.so*
      - usr/lib/*-linux-gnu/libdiscid.so*
