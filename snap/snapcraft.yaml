name: picard
grade: stable
confinement: strict
base: core24
license: GPL-2.0-or-later
adopt-info: picard
contact: https://community.metabrainz.org/c/picard
donation: https://metabrainz.org/donate
issues: https://tickets.metabrainz.org/projects/PICARD/issues/
source-code: https://github.com/metabrainz/picard
website: https://picard.musicbrainz.org/

platforms:
  amd64:
  arm64:

apps:
  picard:
    extensions:
      - kde-neon-6
    common-id: org.musicbrainz.Picard
    command: bin/picard
    environment:
      PYTHONPATH: "$SNAP/usr/lib/python3/dist-packages"
    plugs:
      - gsettings
      - home  # At a minimum users should be allowed to tag files on their home directory
      - optical-drive  # CD lookup support
      - removable-media  # Tagging files on external media is a common use case
    command-chain:
      - snap/command-chain/app-launch

  plugins:
    command: bin/picard-plugins
    plugs:
      - network
    command-chain:
      - snap/command-chain/gpu-2404-wrapper
      - snap/command-chain/shell-launch

  fpcalc:
    command: bin/fpcalc
    plugs:
      - home
      - removable-media
    command-chain:
      - snap/command-chain/shell-launch

  rsgain:
    command: usr/bin/rsgain
    plugs:
      - home
      - removable-media
    command-chain:
      - snap/command-chain/gpu-2404-wrapper
      - snap/command-chain/shell-launch

package-repositories:
  - type: apt
    url: http://origin.archive.neon.kde.org/user
    suites: [noble]
    components: [main]
    architectures: [amd64, arm64]
    key-id: 444DABCF3667D0283F894EDDE6D4736255751E5D

parts:
  picard:
    after:
      - pyqt6
      - selective-checkout
    source: https://github.com/metabrainz/picard.git
    source-branch: master
    # source-tag: release-3.0.0a4
    # source-depth: 1
    parse-info:
      - share/metainfo/org.musicbrainz.Picard.appdata.xml
    plugin: uv
    build-snaps:
      - astral-uv
    uv-extras:
      - plugins
    stage-packages:
      - libxml2

    override-build: |
      "$CRAFT_STAGE"/scriptlets/selective-checkout \
        --release-tag-prefix="release-" \
        --stable-tag-pattern="[[:digit:]]+\.[[:digit:]]+(\.[[:digit:]]+)?$" \
        --beta-tag-pattern="[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+b[[:digit:]]+$"
        # --release-candidate-tag-pattern="[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+rc[[:digit:]]+$"
      git apply --verbose "${SNAPCRAFT_PROJECT_DIR}"/patching/picard/*.patch
      craftctl default

    stage:
      # PyQt installed from requirements, exclude as the snap includes its own PyQt build
      - -lib/python3*/site-packages/PyQt6*
      - -lib/python3*/site-packages/pyqt6*
    prime:
      # Unused binaries
      - -bin/activate*
      - -bin/Activate.ps1
      - -bin/markdown_py
      - -bin/mid3*
      - -bin/moggsplit
      - -bin/mutagen-*
      - -bin/normalizer
      - -bin/pip*
      - -bin/pylupdate6
      - -bin/pyuic6
      # Exclude development files
      - -include/*
      - -lib/python3*/site-packages/opencc/clib/bin/*
      - -lib/python3*/site-packages/opencc/clib/include/*
      - -lib/python3*/site-packages/opencc/clib/lib/*
      - -lib/python3*/site-packages/pygit2/decl/*
      - -usr/include/*
      - -usr/lib/*-linux-gnu/pkgconfig/*
      # Exclude unused Python packages
      - -lib/python3*/site-packages/pip*
      # Exclude unused libraries
      - -usr/lib/*-linux-gnu/libcjson_utils.so*
      - -usr/lib/*-linux-gnu/libhwy_contrib.so*
      - -usr/lib/*-linux-gnu/libhwy_test.so*
      - -usr/lib/*-linux-gnu/libicuio.so*
      - -usr/lib/*-linux-gnu/libicutest.so*
      - -usr/lib/*-linux-gnu/libicutu.so*
      - -usr/lib/*-linux-gnu/libtheora.so*
      - -usr/lib/*-linux-gnu/libzvbi-chains.so*
      # Other excluded files
      - -share/man/

  pyqt6:
    plugin: nil
    source: https://files.pythonhosted.org/packages/8b/47/b25c13eca5bebc6505394d0223e46d7ebf0c57dcac2ed908d7d19b18ab6b/pyqt6-6.11.0.tar.gz
    source-type: tar
    source-checksum: sha256/45dd60aa69976de1918b5ced6b4e7b6a25abd2a919ecef5fd5826ecc76718889
    build-snaps:
      - kde-qt6-core24-sdk
    build-packages:
      - libvulkan-dev
      - python3-pip
    override-build: |
      # Set path to qmake
      echo "[tool.sip.builder]" >> pyproject.toml
      echo "qmake = \"/snap/kde-qt6-core24-sdk/current/usr/bin/qt6/qmake\"" >> pyproject.toml

      # Install build dependencies
      pip install --break-system-packages PyQt6-sip PyQt-builder

      # Build PyQt6
      export LD_LIBRARY_PATH="/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:/snap/kde-qt6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:$LD_LIBRARY_PATH"
      export CFLAGS="-I/snap/kde-qt6-core24-sdk/current/usr/include ${CFLAGS:-}"
      export CXXFLAGS="-I/snap/kde-qt6-core24-sdk/current/usr/include ${CXXFLAGS:-}"
      export LDFLAGS="-L/snap/kde-qt6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR ${LDFLAGS:-}"
      sip-install \
        --qt-shared \
        --concatenate=1 \
        --confirm-license \
        --debug \
        --verbose \
        --jobs="$CRAFT_PARALLEL_BUILD_COUNT" \
        --target-dir="$CRAFT_PART_INSTALL/lib/python3.12/site-packages" \
        --enable=QtCore \
        --enable=QtDBus \
        --enable=QtGui \
        --enable=QtMultimedia \
        --enable=QtNetwork \
        --enable=QtWidgets \
        --no-dbus-python \
        --no-designer-plugin \
        --no-docstrings \
        --no-qml-plugin \
        --no-tools \
        --qmake-setting QMAKE_CFLAGS="$CFLAGS" \
        --qmake-setting QMAKE_CXXFLAGS="$CXXFLAGS" \
        --qmake-setting QMAKE_LFLAGS="$LDFLAGS"

      # The sip.cpython-*.so file is required for PyQt6 during runtime
      install /usr/local/lib/python3.12/dist-packages/PyQt6/sip.cpython-*.so "$CRAFT_PART_INSTALL/lib/python3.12/site-packages/PyQt6"

  # Qt6Multimedia is not included in the kde-neon base snap
  qt6multimedia:
    plugin: nil
    override-pull: |
      apt-get download qt6-multimedia
    override-build: |
      dpkg-deb -x qt6-multimedia_*.deb "$CRAFT_PART_INSTALL"
    stage:
      # Only include the necessary Qt6Multimedia files
      - usr/lib/*-linux-gnu/libQt6Multimedia.so*
      - usr/lib/*-linux-gnu/qt6/plugins/multimedia/libffmpegmediaplugin.so
      # - usr/lib/*-linux-gnu/qt6/plugins/multimedia/libgstreamermediaplugin.so
      - usr/share/doc/qt6-multimedia/copyright

  libdiscid:
    plugin: cmake
    source: https://data.metabrainz.org/pub/musicbrainz/libdiscid/libdiscid-0.6.5.tar.gz
    source-type: tar
    source-checksum: sha256/72dbb493e07336418fe2056f0ebc7ce544eedb500bb896cc1cc04bd078c2d530
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
    prime:
      - -usr/include/*
      - -usr/lib/x86_64-linux-gnu/pkgconfig/*

  fpcalc:
    plugin: nil
    override-pull: |
      case "$CRAFT_ARCH_BUILD_FOR" in
        amd64)
          url="https://github.com/acoustid/chromaprint/releases/download/v1.6.0/chromaprint-fpcalc-1.6.0-linux-x86_64.tar.gz"
          sha256="946dc3eade645eb835c8d163c6bb354e092239988bff190b9c42589e8d5cf00a"
          ;;
        arm64)
          url="https://github.com/acoustid/chromaprint/releases/download/v1.6.0/chromaprint-fpcalc-1.6.0-linux-arm64.tar.gz"
          sha256="c8667f556f77d8ebbe08b75a968c0592bd2a67aaa696eff91715feb5083b1cd4"
          ;;
        *)
          echo "Unsupported architecture: $CRAFT_ARCH_BUILD_FOR"
          exit 1
          ;;
      esac

      rm -rf "$CRAFT_PART_SRC"/*
      curl -L "$url" -o fpcalc.tar.gz
      echo "$sha256  fpcalc.tar.gz" | sha256sum -c -
      tar -xzf fpcalc.tar.gz -C "$CRAFT_PART_SRC"
    override-build: |
      mkdir -p $CRAFT_PART_INSTALL/bin
      install -m755 chromaprint-fpcalc-*/fpcalc $CRAFT_PART_INSTALL/bin/fpcalc

  rsgain:
    plugin: cmake
    source: https://github.com/complexlogic/rsgain/releases/download/v3.7/rsgain-3.7-source.tar.xz
    source-type: tar
    source-checksum: sha256/54037f73ba6682f9b71b2265275f5f89de50b90b12d5af512287c60d9d52c9cc
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
    build-packages:
      - build-essential
      - libavcodec-dev
      - libavformat-dev
      - libavutil-dev
      - libebur128-dev
      - libfmt-dev
      - libinih-dev
      - libswresample-dev
      - libtag1-dev
      - pkg-config
    stage-packages:
      - libebur128-1
      - libfmt9
      - libinih1

  # Custom launch scripts
  command-chain:
    plugin: dump
    source: command-chain
    organize:
      '*': snap/command-chain/

  # Check out the tagged release revision if it isn't promoted to the stable channel
  # https://forum.snapcraft.io/t/selective-checkout-check-out-the-tagged-release-revision-if-it-isnt-promoted-to-the-stable-channel/10617
  selective-checkout:
    source: https://github.com/Lin-Buo-Ren/selective-checkout.git
    source-tag: v3.0.6
    plugin: dump
    build-packages:
      - curl
      - jq
      - sed
      - git
    stage:
      - scriptlets/selective-checkout
    prime:
      - -*

  cleanup:
    after:
      - picard
      - libdiscid
      - fpcalc
      - rsgain
      - qt6multimedia
    plugin: nil
    build-snaps:
      - core24
      - kf6-core24
    override-prime: |
      # Remove duplicate files in the dependent snaps from the final snap.
      for snap in "core24" "kf6-core24"; do
        cd "/snap/$snap/current/usr"
        find . -type f,l -print | grep -vf "$CRAFT_PROJECT_DIR/snap/cleanup-ignore.txt" | sed 's|^./|$CRAFT_PRIME/usr/|' | xargs rm -f
      done

      cd "$CRAFT_PRIME"

      # Fully remove additional files from the final snap.
      rm -rf usr/lib/*-linux-gnu/vdpau/
      rm -rf usr/lib/*-linux-gnu/libdrm_intel.so*
      rm -rf usr/lib/*-linux-gnu/libwayland-client.so*
      rm -rf usr/share/bug/
      rm -rf usr/share/lintian/
      rm -rf usr/share/man/
      rm -rf usr/share/pkgconfig/
      rm -rf usr/share/X11/
      rm -rf etc/fonts/
      rm -rf etc/vdpau_wrapper.cfg

      # Remove broken symlinks
      find . -xtype l -delete

      # Remove empty directories
      find . -depth -type d -empty -delete

      # Fix broken libxml2.so symlinks
      ln -sf libxml.so.2 usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libxml2.so.2

lint:
  ignore:
    - library:
      - usr/lib/*-linux-gnu/libdiscid.so*  # dynamically loaded during runtime
      - usr/lib/*-linux-gnu/libQt6Multimedia.so*  # needed by libffmpegmediaplugin
